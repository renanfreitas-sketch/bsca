<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSCA — Comunicados por Categoria 2026/2027</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap');

  /* ─── BSCA BRAND VARIABLES ─── */
  :root {
    --bsca-green: #1E5C34;
    --bsca-dark:  #0F2E1A;
    --gold:       #C9A84C;
    --gold-hover: #D4B55A;
    --cream:      #F5F0E8;
    --milk:       #FAFAF8;
    --white:      #FFFFFF;
    --border:     #E4DDD5;
    --text:       #1A1A1A;
    --text-mid:   #4A4A4A;
    --text-light: #6B7280;
    --green-light:#EAF2EE;
    /* legacy aliases */
    --espresso: #1A1A1A;
    --mocha:    #4A3728;
    --caramel:  #A0522D;
    --latte:    #C8956C;
    --green:    #1E5C34;
    --gray:     #6B7280;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #EDEAE4;
    color: var(--text);
    -webkit-text-size-adjust: 100%;
  }

  /* ─── BRAND HEADER ─── */
  .brand-header {
    background: var(--bsca-dark);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    min-height: 58px;
  }
  .brand-header-logo a { display: flex; align-items: center; }
  .brand-header-logo img { height: 38px; display: block; }
  .brand-header-tagline {
    color: rgba(255,255,255,0.5);
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.3px;
    flex: 1;
    text-align: right;
  }

  /* ─── LANG SWITCHER ─── */
  .lang-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--white);
    border-bottom: 2px solid var(--gold);
    padding: 10px 32px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .lang-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-mid);
    font-size: .8rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: .5px;
    transition: all .2s;
    font-family: 'Inter', sans-serif;
  }
  .lang-btn:hover { border-color: var(--bsca-green); color: var(--bsca-green); }
  .lang-btn.active { background: var(--bsca-green); border-color: var(--bsca-green); color: var(--white); }

  /* ─── PAGE WRAPPER ─── */
  .page-wrapper { max-width: 960px; margin: 0 auto; padding: 44px 24px 64px; }

  /* ─── PAGE TITLE ─── */
  .page-title { text-align: center; margin-bottom: 48px; }
  .page-title h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--bsca-dark);
    letter-spacing: -.5px;
    line-height: 1.2;
  }
  .page-title p { color: var(--text-mid); font-size: .95rem; margin-top: 8px; }

  /* ─── INDEX ─── */
  .index {
    background: var(--white);
    border-radius: 16px;
    padding: 28px 32px;
    box-shadow: 0 2px 16px rgba(0,0,0,.06);
    margin-bottom: 56px;
    border: 1px solid var(--border);
  }
  .index h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--bsca-dark);
    margin-bottom: 16px;
    border-bottom: 2px solid var(--gold);
    padding-bottom: 10px;
  }
  .index-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px,1fr)); gap: 8px; }
  .index-grid a {
    color: var(--bsca-dark);
    text-decoration: none;
    font-size: .83rem;
    font-weight: 500;
    padding: 8px 12px;
    border-radius: 8px;
    background: var(--cream);
    transition: all .2s;
    display: block;
    border: 1px solid transparent;
  }
  .index-grid a:hover { background: var(--bsca-green); color: var(--white); }

  /* ─── FLYER CARD ─── */
  .flyer {
    background: var(--white);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 28px rgba(0,0,0,.09);
    margin-bottom: 56px;
    border: 1px solid var(--border);
  }

  /* ─── FLYER HEADER ─── */
  .flyer-header {
    padding: 32px 40px 28px;
    position: relative;
    overflow: hidden;
  }
  .flyer-header::before {
    content: '';
    position: absolute; top: -50px; right: -50px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(255,255,255,.06);
    pointer-events: none;
  }
  .flyer-header::after {
    content: '';
    position: absolute; bottom: -70px; right: 70px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,.04);
    pointer-events: none;
  }
  .header-logo {
    height: 30px;
    margin-bottom: 18px;
    display: block;
    position: relative;
    z-index: 1;
    opacity: .92;
  }
  .flyer-badge {
    display: inline-block;
    background: rgba(255,255,255,.16);
    border: 1px solid rgba(255,255,255,.25);
    color: rgba(255,255,255,.9);
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }
  .flyer-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.85rem;
    color: var(--white);
    line-height: 1.2;
    position: relative;
    z-index: 1;
  }
  .flyer-header .tagline {
    margin-top: 10px;
    color: rgba(255,255,255,.78);
    font-size: .86rem;
    position: relative;
    z-index: 1;
    line-height: 1.5;
  }

  /* ─── FLYER BODY ─── */
  .flyer-body { background: var(--milk); padding: 32px 40px; }
  .flyer-intro {
    color: var(--text);
    font-size: .95rem;
    line-height: 1.75;
    margin-bottom: 28px;
    border-left: 3px solid var(--gold);
    padding-left: 16px;
  }

  /* ─── OPTION SELECTOR ─── */
  .option-selector { margin-bottom: 24px; }
  .selector-label {
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 12px;
  }
  .option-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
    gap: 8px;
    margin-bottom: 16px;
  }
  .option-card {
    background: var(--white);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px;
    cursor: pointer;
    transition: all .18s;
    text-align: center;
    min-height: 68px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .option-card:hover  { border-color: var(--bsca-green); background: #F0F7F2; }
  .option-card.selected { border-color: var(--bsca-green); background: #E6F2EB; }
  .opt-name { font-size: .9rem; font-weight: 700; color: var(--bsca-dark); margin-bottom: 4px; }
  .opt-desc { font-size: .68rem; color: var(--text-light); line-height: 1.4; }

  /* ─── PRICE REVEAL ─── */
  .price-reveal { display: none; animation: fadeIn .3s ease; }
  .price-reveal.visible { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

  /* ─── PRICING BOX ─── */
  .pricing-box {
    background: var(--white);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 22px 24px;
    margin-bottom: 24px;
  }
  .pricing-box h4 {
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 16px;
  }
  .price-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .price-item {
    background: var(--cream);
    border-radius: 10px;
    padding: 14px 14px;
    border: 1px solid var(--border);
  }
  .price-item .label {
    font-size: .68rem;
    font-weight: 600;
    color: var(--bsca-green);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 6px;
  }
  .price-item .value { font-size: 1.1rem; font-weight: 700; color: var(--bsca-dark); line-height: 1.2; }
  .price-item .sub { font-size: .68rem; color: var(--text-light); margin-top: 4px; line-height: 1.4; }

  .price-free-box {
    background: var(--green-light);
    border-radius: 12px;
    padding: 22px 20px;
    text-align: center;
    margin-bottom: 24px;
    border: 1px solid rgba(30,92,52,.18);
  }
  .price-free-box .value { font-size: 1.8rem; font-weight: 900; color: var(--bsca-green); letter-spacing: -.5px; }
  .price-free-box .sub { font-size: .85rem; color: var(--bsca-green); margin-top: 6px; font-weight: 500; }

  /* ─── BENEFITS ─── */
  .benefits { margin-bottom: 24px; }
  .benefits h4 {
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 12px;
  }
  .benefit-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .benefit-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    background: var(--white);
    border-radius: 10px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    transition: border-color .15s;
  }
  .benefit-item:hover { border-color: var(--bsca-green); }
  .benefit-icon { font-size: 1.05rem; flex-shrink: 0; margin-top: 1px; }
  .benefit-text { font-size: .8rem; color: var(--text); line-height: 1.5; font-weight: 400; }

  /* ─── FOOTNOTE ─── */
  .footnote { font-size: .68rem; color: #999; margin-top: 10px; line-height: 1.5; }

  /* ─── CTA BAR ─── */
  .cta-bar {
    background: var(--bsca-dark);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .cta-text { color: rgba(255,255,255,.82); font-size: .88rem; line-height: 1.55; }
  .cta-text strong { color: var(--gold); display: block; font-size: .95rem; margin-bottom: 3px; }
  .cta-btn {
    background: var(--gold);
    color: var(--bsca-dark);
    font-weight: 700;
    font-size: .88rem;
    padding: 13px 26px;
    border-radius: 30px;
    text-decoration: none;
    letter-spacing: .3px;
    white-space: nowrap;
    display: inline-block;
    transition: background .2s, transform .15s;
    flex-shrink: 0;
    font-family: 'Inter', sans-serif;
  }
  .cta-btn:hover { background: var(--gold-hover); transform: translateY(-1px); }

  /* ─── USD BOX ─── */
  .usd-box {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 24px;
  }
  .usd-box h4 {
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 16px;
  }
  .usd-main { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
  .usd-price {
    background: var(--cream);
    border-radius: 10px;
    padding: 14px 18px;
    flex: 1;
    min-width: 140px;
    border: 1px solid var(--border);
  }
  .usd-price .label { font-size: .68rem; font-weight: 600; color: var(--bsca-green); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
  .usd-price .value { font-size: 1.2rem; font-weight: 700; color: var(--bsca-dark); }
  .usd-rate-note { font-size: .68rem; color: var(--text-light); margin-top: 8px; font-style: italic; }

  /* ─── THEME COLORS ─── */
  .theme-producer .flyer-header  { background: linear-gradient(135deg,#1E5C34,#0F2E1A); }
  .theme-roaster .flyer-header   { background: linear-gradient(135deg,#3E1F0A,#1F0D04); }
  .theme-cafe .flyer-header      { background: linear-gradient(135deg,#8B4513,#5A2A08); }
  .theme-exporter .flyer-header  { background: linear-gradient(135deg,#1A3A6B,#0D2040); }
  .theme-coop .flyer-header      { background: linear-gradient(135deg,#4A2D7B,#2A1550); }
  .theme-broker .flyer-header    { background: linear-gradient(135deg,#7A4010,#4A2208); }
  .theme-storage .flyer-header   { background: linear-gradient(135deg,#2E5E28,#183514); }
  .theme-equipment .flyer-header { background: linear-gradient(135deg,#1A4A6B,#0D2A40); }
  .theme-community .flyer-header { background: linear-gradient(135deg,#2E3A4A,#1A2230); }
  .theme-intl .flyer-header      { background: linear-gradient(135deg,#0D3D6B,#061E38); }

  /* ─── FOOTER ─── */
  .site-footer { text-align: center; color: var(--text-light); font-size: .78rem; margin-top: 16px; opacity: .7; }

  /* ─── RESPONSIVE — TABLET 768px ─── */
  @media (max-width: 768px) {
    .brand-header { padding: 0 20px; }
    .brand-header-tagline { display: none; }
    .lang-bar { padding: 10px 20px; }
    .page-wrapper { padding: 32px 16px 48px; }
    .page-title h1 { font-size: 1.85rem; }
    .index { padding: 22px 22px; }
    .index-grid { grid-template-columns: repeat(auto-fill, minmax(175px,1fr)); }
    .flyer-header { padding: 26px 28px 22px; }
    .flyer-header h2 { font-size: 1.6rem; }
    .flyer-body { padding: 26px 28px; }
    .cta-bar { padding: 22px 28px; }
    .price-grid { grid-template-columns: repeat(3,1fr); }
  }

  /* ─── RESPONSIVE — MOBILE 600px ─── */
  @media (max-width: 600px) {
    .brand-header { min-height: 50px; }
    .brand-header-logo img { height: 32px; }
    .lang-bar { padding: 8px 16px; gap: 6px; }
    .lang-btn { padding: 6px 12px; font-size: .75rem; }
    .page-wrapper { padding: 28px 12px 40px; }
    .page-title { margin-bottom: 36px; }
    .page-title h1 { font-size: 1.5rem; }
    .page-title p { font-size: .85rem; }
    .index { padding: 18px 16px; margin-bottom: 36px; border-radius: 12px; }
    .index-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
    .index-grid a { font-size: .78rem; padding: 7px 10px; }
    .flyer { border-radius: 14px; margin-bottom: 36px; }
    .flyer-header { padding: 22px 20px 18px; }
    .flyer-header h2 { font-size: 1.35rem; }
    .flyer-header .tagline { font-size: .8rem; }
    .header-logo { height: 24px; margin-bottom: 14px; }
    .flyer-badge { font-size: .62rem; }
    .flyer-body { padding: 20px 20px; }
    .flyer-intro { font-size: .88rem; line-height: 1.65; margin-bottom: 22px; }
    .option-grid { grid-template-columns: repeat(2,1fr); }
    .option-card { min-height: 60px; padding: 12px 8px; }
    .opt-name { font-size: .85rem; }
    .benefit-list { grid-template-columns: 1fr; }
    .price-grid { grid-template-columns: 1fr; gap: 8px; }
    .price-item { padding: 12px 14px; }
    .price-item .value { font-size: 1rem; }
    .cta-bar { padding: 18px 20px; flex-direction: column; align-items: flex-start; gap: 14px; }
    .cta-btn { width: 100%; text-align: center; padding: 14px 20px; }
    .usd-main { flex-direction: column; }
    .usd-price { min-width: unset; }
    .pricing-box { padding: 18px 16px; }
  }

  /* ─── RESPONSIVE — SMALL 400px ─── */
  @media (max-width: 400px) {
    .page-title h1 { font-size: 1.3rem; }
    .flyer-header h2 { font-size: 1.2rem; }
    .index-grid { grid-template-columns: 1fr; }
    .option-grid { grid-template-columns: 1fr 1fr; }
    .brand-header { padding: 0 14px; }
    .lang-bar { padding: 8px 12px; }
  }

  /* ─── PRINT ─── */
  @media print {
    body { background: #fff; }
    .brand-header, .lang-bar, .index { display: none; }
    .flyer { box-shadow: none; page-break-after: always; margin-bottom: 0; border: none; border-radius: 0; }
    .flyer-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<!-- BRAND HEADER -->
<div class="brand-header">
  <div class="brand-header-logo">
    <a href="https://www.bsca.com.br" target="_blank">
      <img src="https://www.bsca.com.br/wp-content/uploads/2025/09/Logo_BSCA-white.png" alt="BSCA — Associação Brasileira de Cafés Especiais">
    </a>
  </div>
  <span class="brand-header-tagline" data-i18n="brand_tagline"></span>
</div>

<!-- LANGUAGE SWITCHER -->
<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('pt')">🇧🇷 PT</button>
  <button class="lang-btn" onclick="setLang('en')">🇺🇸 EN</button>
  <button class="lang-btn" onclick="setLang('es')">🇪🇸 ES</button>
</div>

<div class="page-wrapper">

<!-- PAGE TITLE -->
<div class="page-title">
  <h1 data-i18n="page_title"></h1>
  <p data-i18n="page_sub"></p>
</div>

<!-- INDEX -->
<div class="index">
  <h2 data-i18n="idx_title"></h2>
  <div class="index-grid" id="index-grid"></div>
</div>

<!-- ══════════════════ 1. PRODUTOR ══════════════════ -->
<div class="flyer theme-producer" id="produtor">
  <div class="flyer-header">
    <div class="flyer-badge" data-i18n="prod_badge"></div>
    <h2 data-i18n="prod_title"></h2>
    <p class="tagline" data-i18n="prod_tagline"></p>
  </div>
  <div class="flyer-body">
    <p class="flyer-intro" data-i18n="prod_intro"></p>
    <div class="option-selector">
      <p class="selector-label" data-i18n="prod_sel_label"></p>
      <div class="option-grid" id="produtor-opts"></div>
      <div class="price-reveal" id="produtor-price"></div>
    </div>
    <div class="benefits">
      <h4 data-i18n="lbl_benefits"></h4>
      <div class="benefit-list" id="prod-benefits"></div>
    </div>
  </div>
  <div class="cta-bar">
    <div class="cta-text"><strong data-i18n="prod_cta_strong"></strong><span data-i18n="prod_cta_sub"></span></div>
    <a class="cta-btn" href="http://app.associatec.com.br/AreaAssociados/BSCA" target="_blank" data-i18n="lbl_cta_btn"></a>
  </div>
</div>

<!-- ══════════════════ 2. TORREFADOR ══════════════════ -->
<div class="flyer theme-roaster" id="torrefador">
  <div class="flyer-header">
    <div class="flyer-badge" data-i18n="torr_badge"></div>
    <h2 data-i18n="torr_title"></h2>
    <p class="tagline" data-i18n="torr_tagline"></p>
  </div>
  <div class="flyer-body">
    <p class="flyer-intro" data-i18n="torr_intro"></p>
    <div class="option-selector">
      <p class="selector-label" data-i18n="torr_sel_label"></p>
      <div class="option-grid" id="torr-opts"></div>
      <div class="price-reveal" id="torr-price"></div>
    </div>
    <div class="benefits">
      <h4 data-i18n="lbl_benefits"></h4>
      <div class="benefit-list" id="torr-benefits"></div>
    </div>
  </div>
  <div class="cta-bar">
    <div class="cta-text"><strong data-i18n="torr_cta_strong"></strong><span data-i18n="torr_cta_sub"></span></div>
    <a class="cta-btn" href="http://app.associatec.com.br/AreaAssociados/BSCA" target="_blank" data-i18n="lbl_cta_btn"></a>
  </div>
</div>

<!-- ══════════════════ 3. CAFETERIA ══════════════════ -->
<div class="flyer theme-cafe" id="cafeteria">
  <div class="flyer-header">
    <div class="flyer-badge" data-i18n="cafe_badge"></div>
    <h2 data-i18n="cafe_title"></h2>
    <p class="tagline" data-i18n="cafe_tagline"></p>
  </div>
  <div class="flyer-body">
    <p class="flyer-intro" data-i18n="cafe_intro"></p>
    <div class="pricing-box">
      <h4 data-i18n="lbl_investment"></h4>
      <div class="price-grid">
        <div class="price-item"><div class="label" data-i18n="lbl_annual"></div><div class="value">R$ 1.360,57</div><div class="sub" data-i18n="lbl_annual_sub"></div></div>
        <div class="price-item"><div class="label" data-i18n="lbl_semi"></div><div class="value">2x R$ 711,18</div><div class="sub" data-i18n="lbl_semi_sub"></div></div>
        <div class="price-item"><div class="label" data-i18n="lbl_monthly"></div><div class="value">12x R$ 123,68</div><div class="sub" data-i18n="lbl_total_sub"></div><div class="sub">R$ 1.484,21</div></div>
      </div>
    </div>

let lang = 'pt';
const selections = {produtor:null,torr:null,exp:null,coop:null};

// ─── HELPERS ─────────────────────────────────────────────────────
function t(key){ return T[lang][key] || key; }

function benefitHTML(keys){
  return keys.map(k=>{
    const b = BENEFITS[k][lang];
    const [icon,...rest] = b.split(' ');
    return `<div class="benefit-item"><div class="benefit-icon">${icon}</div><div class="benefit-text">${rest.join(' ')}</div></div>`;
  }).join('');
}

function priceBoxHTML(p){
  return `
  <div class="pricing-box">
    <h4>${t('lbl_investment')}</h4>
    <div class="price-grid">
      <div class="price-item"><div class="label">${t('lbl_annual')}</div><div class="value">${p.annual}</div><div class="sub">${t('lbl_annual_sub')}</div></div>
      <div class="price-item"><div class="label">${t('lbl_semi')}</div><div class="value">${p.semi}</div><div class="sub">${t('lbl_semi_sub')}</div></div>
      <div class="price-item"><div class="label">${t('lbl_monthly')}</div><div class="value">${p.monthly}</div><div class="sub">${t('lbl_total_sub')} ${p.total}</div></div>
    </div>
    <p class="footnote">${t('footnote_adj')}</p>
  </div>`;
}

function optCardHTML(opt, selectorId, selectedId){
  const sel = selectedId === opt.id ? ' selected' : '';
  return `<div class="option-card${sel}" onclick="selectOpt('${selectorId}','${opt.id}')">
    <div class="opt-name">${opt.name}</div>
    <div class="opt-desc">${opt.desc}</div>
  </div>`;
}

// ─── SELECTORS ────────────────────────────────────────────────────
function selectOpt(selector, optId){
  selections[selector] = optId;
  renderSelector(selector);
}

function renderSelector(selector){
  const configs = {
    produtor:{optsKey:'prod_opts',pricesKey:'prod',optsEl:'produtor-opts',priceEl:'produtor-price'},
    torr:    {optsKey:'torr_opts',pricesKey:'torr',optsEl:'torr-opts',    priceEl:'torr-price'},
    exp:     {optsKey:'exp_opts', pricesKey:'exp', optsEl:'exp-opts',     priceEl:'exp-price'},
    coop:    {optsKey:'coop_opts',pricesKey:'coop',optsEl:'coop-opts',    priceEl:'coop-price'}
  };
  const cfg = configs[selector];
  if(!cfg) return;
  const opts = t(cfg.optsKey);
  const sel  = selections[selector];
  document.getElementById(cfg.optsEl).innerHTML = opts.map(o=>optCardHTML(o,selector,sel)).join('');
  const priceEl = document.getElementById(cfg.priceEl);
  if(sel && PRICES[cfg.pricesKey] && PRICES[cfg.pricesKey][sel]){
    priceEl.innerHTML = priceBoxHTML(PRICES[cfg.pricesKey][sel]);
    priceEl.classList.add('visible');
  } else {
    priceEl.innerHTML = '';
    priceEl.classList.remove('visible');
  }
}

// ─── i18n UPDATE ──────────────────────────────────────────────────
function applyTranslations(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.dataset.i18n;
    const val = t(key);
    if(typeof val === 'string') el.innerHTML = val.replace(/\n/g,'<br>');
  });
}

// ─── LANG SWITCH ─────────────────────────────────────────────────
function setLang(l){
  lang = l;
  document.documentElement.lang = l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  applyTranslations();
  renderIndex();
  renderAllBenefits();
  renderSelector('produtor');
  renderSelector('torr');
  renderSelector('exp');
  renderSelector('coop');
  updateIntlBRL();
}

// ─── USD RATE ────────────────────────────────────────────────────
const USD_PRICE = 739.11;
let cachedRate = null;
let cachedDate = null;

function fmtBRL(v){
  return 'R$ ' + v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function updateIntlBRL(){
  const noteEl = document.getElementById('intl-rate-note');
  const valEl  = document.getElementById('intl-brl-value');
  if(cachedRate){
    const brl = USD_PRICE * cachedRate;
    valEl.textContent = fmtBRL(brl);
    const rateLabel = `US$ 1 = R$ ${cachedRate.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:4})}`;
    noteEl.textContent = `${t('intl_rate_prefix')} ${cachedDate} ${t('intl_rate_middle')} R$ ${cachedRate.toLocaleString('pt-BR',{minimumFractionDigits:4,maximumFractionDigits:4})}`;
  } else {
    noteEl.textContent = t('intl_loading');
    valEl.textContent = '—';
  }
}

async function fetchUSDRate(){
  try {
    const res  = await fetch('https://economia.awesomeapi.com.br/json/last/USD-BRL');
    const data = await res.json();
    const bid  = parseFloat(data.USDBRL.bid);
    const ts   = data.USDBRL.create_date; // "2024-06-14 10:30:00"
    if(!isNaN(bid)){
      cachedRate = bid;
      const [datePart, timePart] = ts.split(' ');
      const [y,m,d] = datePart.split('-');
      cachedDate = `${d}/${m}/${y} ${timePart ? timePart.substring(0,5) : ''}`;
    }
  } catch(e){
    cachedDate = new Date().toLocaleDateString('pt-BR');
  }
  updateIntlBRL();
}
